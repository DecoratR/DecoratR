name: release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

env:
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      VERSION: ${{ steps.get-version.outputs.VERSION }}
    steps:
      - name: Get version
        id: get-version
        run: |
          VERSION="${{ github.ref_name }}"
          echo "VERSION=${VERSION#v}" >> $GITHUB_OUTPUT

  publish:
    runs-on: ubuntu-latest
    needs: get-version
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Cache NuGet packages
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          key: ${{ github.repository }}-nuget-${{ hashFiles('**/*.csproj') }}
          path: ${{ env.NUGET_PACKAGES }}

      - name: Setup .NET
        uses: fast-actions/setup-dotnet@ff62d0d43b74c155b57b842f610b1eeaf39c5897 # v1

      - name: Restore dependencies
        run: dotnet restore

      - name: Pack Abstractions
        run: dotnet pack ./src/DecoratR.Abstractions -c Release --no-restore --output nupkgs /p:Version=${{ needs.get-version.outputs.VERSION }}

      - name: Pack Generator
        run: dotnet pack ./src/DecoratR.Generator -c Release --no-restore --output nupkgs /p:Version=${{ needs.get-version.outputs.VERSION }}

      - name: Publish Packages
        run: dotnet nuget push nupkgs/*.nupkg -k ${{ secrets.NUGET_KEY }} -s https://api.nuget.org/v3/index.json
